name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17 (Required for Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Initialize Project and Install Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Capacitor'ı yapılandırıyoruz. Giriş dosyasını kök dizin (root) olarak ayarlıyoruz.
        npx cap init "Acamay EV Pro" "com.aliarslan.acamayevpro" --web-dir=.

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Files to Android Studio Project
      run: npx cap copy

    - name: Build Android App (Unsigned APK)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Acamay-EV-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
