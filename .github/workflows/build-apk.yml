name: Build Android APK (Acamay EV Pro)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Android SDK
      uses: android-actions/sdk-starter@v1

    - name: Paketleri Kur
      run: |
        rm -rf android package.json package-lock.json node_modules .gradle
        npm init -y
        npm install \
          @capacitor/core@5.7.0 \
          @capacitor/cli@5.7.0 \
          @capacitor/android@5.7.0 \
          @capacitor-community/bluetooth-le@3.1.2 \
          @capacitor/network@5.0.7 \
          @capacitor/assets@3.0.5 \
          --save-exact

    # Sizin yapınızda index.html ana dizinde olduğu için Capacitor'a '.' (aksa dizin) hedef gösterildi
    - name: Capacitor Init
      run: npx cap init "Acamay EV Pro" "com.acamay.evsarj" --web-dir=.

    - name: capacitor.config.json Olustur
      run: |
        cat > capacitor.config.json << 'JSON'
        {
          "appId": "com.acamay.evsarj",
          "appName": "Acamay EV Pro",
          "webDir": ".",
          "android": {
            "allowMixedContent": true,
            "useLegacyBridge": false
          },
          "server": {
            "androidScheme": "http",
            "cleartext": true
          },
          "plugins": {
            "BluetoothLe": {
              "displayStrings": {
                "scanning": "BLE Cihazlar Araniyor...",
                "cancel": "Iptal",
                "availableDevices": "Bulunan Cihazlar",
                "noDeviceFound": "Cihaz Bulunamadi"
              }
            }
          }
        }
        JSON

    - name: Android Platform Ekle
      run: npx cap add android

    - name: AndroidManifest.xml Guncelle
      run: |
        cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.INTERNET" />
          <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />
          <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>
          <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>
          <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation"/>
          <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
          <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
          <uses-permission android:name="android.permission.VIBRATE" />
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
          <uses-feature android:name="android.hardware.bluetooth_le" android:required="false"/>
          <application
            android:allowBackup="true"
            android:icon="@mipmap/ic_launcher"
            android:label="Acamay EV Pro"
            android:roundIcon="@mipmap/ic_launcher_round"
            android:supportsRtl="true"
            android:theme="@style/AppTheme"
            android:usesCleartextTraffic="true"
            android:networkSecurityConfig="@xml/network_security_config">
            <activity
              android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
              android:name=".MainActivity"
              android:label="Acamay EV Pro"
              android:launchMode="singleTask"
              android:exported="true"
              android:theme="@style/AppTheme.NoActionBarLaunch"
              android:windowSoftInputMode="adjustResize">
              <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
              </intent-filter>
            </activity>
            <provider
              android:name="androidx.core.content.FileProvider"
              android:authorities="${applicationId}.fileprovider"
              android:exported="false"
              android:grantUriPermissions="true">
              <meta-data
                android:name="android.support.FILE_PROVIDER_PATHS"
                android:resource="@xml/file_paths"/>
            </provider>
          </application>
        </manifest>
        MANIFEST

    - name: Network Security Config Ekle
      run: |
        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/network_security_config.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <network-security-config>
          <base-config cleartextTrafficPermitted="true">
            <trust-anchors>
              <certificates src="system"/>
            </trust-anchors>
          </base-config>
          <domain-config cleartextTrafficPermitted="true">
            <domain includeSubdomains="true">192.168.1.88</domain>
            <domain includeSubdomains="true">192.168.0.0</domain>
            <domain includeSubdomains="true">10.0.0.0</domain>
            <domain includeSubdomains="true">localhost</domain>
          </domain-config>
        </network-security-config>
        XML

    # Reponuzdaki gerçek icon.png ve splash.png dosyalarını otomatik kullanır
    - name: Logo ve Splash Varliklarini Enjekte Et
      run: |
        mkdir -p assets
        cp icon.png assets/icon-only.png
        cp icon.png assets/icon-foreground.png
        cp splash.png assets/splash.png
        cp splash.png assets/splash-dark.png
        
        python3 -c "
        import struct, zlib
        def write_chunk(chunk_type, data):
            c = chunk_type + data
            return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
        ihdr = struct.pack('>II', 512, 512) + bytes([8,6,0,0,0])
        pixels = [b'\x00' + bytes([255, 255, 255, 255]*512) for _ in range(512)]
        png = b'\x89PNG\r\n\x1a\n' + write_chunk(b'IHDR', ihdr) + write_chunk(b'IDAT', zlib.compress(b''.join(pixels))) + write_chunk(b'IEND', b'')
        with open('assets/icon-background.png', 'wb') as f: f.write(png)
        "
        npx capacitor-assets generate --android

    - name: JAVA_HOME Ayarla
      run: |
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
        echo "org.gradle.java.home=$JAVA_HOME_17_X64" >> android/gradle.properties

    - name: Capacitor Sync
      run: npx cap sync android

    - name: Android Lisanslari
      run: |
        cd android
        mkdir -p "$ANDROID_HOME/licenses"
        yes | sdkmanager --licenses || true

    - name: APK Derle
      run: |
        cd android
        chmod -R +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: APK Yukle
      uses: actions/upload-artifact@v4
      with:
        name: Acamay-EV-Pro-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
