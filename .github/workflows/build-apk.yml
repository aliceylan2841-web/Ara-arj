name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17 (Required for Android Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK & Accept Licenses Automatically
      uses: android-actions/setup-android@v3
      with:
        log-accepted-licenses: true

    - name: Clean and Initialize Project
      run: |
        rm -rf android package.json package-lock.json node_modules .gradle
        npm init -y
        # cordova-res ve gerekli bağımlılıkları güvenli sürümlerle kuruyoruz
        npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0 --save-exact
        npm install cordova-res --global

    - name: Initialize Capacitor Config
      run: |
        npx cap init "Acamay EV Pro" "com.aliarslan.acamayevpro" --web-dir=www --confirm

    - name: Add Android Platform
      run: npx cap add android

    # Kaynak klasörlerini garantiye alıp ikon üretimini sağlama alıyoruz
    - name: Generate Icons and Splash Screens
      run: |
        mkdir -p resources
        [ -f icon.png ] && cp icon.png resources/icon.png || echo "icon.png bulunamadı"
        [ -f splash.png ] && cp splash.png resources/splash.png || echo "splash.png bulunamadı"
        if [ -f resources/icon.png ] && [ -f resources/splash.png ]; then
          cordova-res android --skip-config --copy
        else
          echo "Görseller eksik olduğu için varsayılan ikonlarla devam ediliyor."
        fi

    - name: Set JAVA_HOME for Gradle
      run: |
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
        echo "org.gradle.java.home=$JAVA_HOME_17_X64" >> android/gradle.properties

    - name: Copy Web Files to Android Studio Project
      run: npx cap copy

    - name: Final Android Licenses Sync
      run: |
        cd android
        mkdir -p -v "$ANDROID_HOME/licenses"
        yes | sdkmanager --licenses || true

    - name: Build Android App (Unsigned APK)
      run: |
        cd android
        chmod -R +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Acamay-EV-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
