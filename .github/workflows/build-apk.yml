name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17 (Required for Android Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # Resmi ve otomatik lisans onaylayan Android SDK motorunu kuruyoruz
    - name: Setup Android SDK & Accept Licenses Automatically
      uses: android-actions/setup-android@v3
      with:
        log-accepted-licenses: true

    - name: Install Dependencies & Configure Capacitor
      run: |
        rm -rf android package.json package-lock.json node_modules
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5
        npm install @capacitor/android@5
        npx cap init "Acamay EV Pro" "com.aliarslan.acamayevpro" --web-dir=.

    - name: Add Android Platform Fresh
      run: npx cap add android

    - name: Set JAVA_HOME for Gradle
      run: |
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
        echo "org.gradle.java.home=$JAVA_HOME_17_X64" >> android/gradle.properties

    - name: Copy Web Files to Android Studio Project
      run: npx cap copy

    # Derleme adımı öncesi yerel lisans klasörlerini de tamamen garantiye alıyoruz
    - name: Final Android Licenses Sync
      run: |
        cd android
        mkdir -p -v "$ANDROID_HOME/licenses"
        yes | sdkmanager --licenses || true

    - name: Build Android App (Unsigned APK)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Acamay-EV-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
