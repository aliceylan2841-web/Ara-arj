name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up JDK 17 (Required for Android Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Android lisanslarını bulut sunucusunda otomatik onaylıyoruz (Hata veren kısmı düzelttik)
    - name: Accept Android Licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Clean and Initialize Project
      run: |
        rm -rf android package.json package-lock.json node_modules .gradle
        mkdir -p www
        [ ! -f www/index.html ] && echo "<html><body>Acamay EV Pro</body></html>" > www/index.html || true
        npm init -y
        npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0 --save-exact

    - name: Initialize Capacitor Config
      run: |
        npx cap init "Acamay EV Pro" "com.aliarslan.acamayevpro" --web-dir=www --confirm

    - name: Add Android Platform
      run: npx cap add android

    # Yüklediğin harika logoyu Android sistem klasörlerine gömüyoruz
    - name: Inject Custom App Icons & Splash
      run: |
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/drawable
        
        if [ -f icon.png ]; then
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          echo "Uygulama ikonu başarıyla enjekte edildi."
        else
          echo "icon.png bulunamadı, varsayılan ikon kullanılacak."
        fi
        
        if [ -f splash.png ]; then
          cp splash.png android/app/src/main/res/drawable/splash.png
          echo "Açılış ekranı başarıyla enjekte edildi."
        else
          echo "splash.png bulunamadı."
        fi

    - name: Set JAVA_HOME for Gradle
      run: |
        echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
        echo "org.gradle.java.home=$JAVA_HOME_17_X64" >> android/gradle.properties

    - name: Copy Web Files to Android Studio Project
      run: npx cap copy

    - name: Build Android App (Unsigned APK)
      run: |
        cd android
        chmod -R +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Acamay-EV-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
